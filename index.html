<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KILL YOURSELF!!!!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    h1 {
      font-family: 'Black Ops One', cursive;
      font-size: clamp(3rem, 12vw, 9rem);
      line-height: 1;
      color: #ff2020;
      text-shadow: 4px 4px 0 #7a0000, 0 0 40px #ff000088;
      animation: flicker 3s infinite;
      letter-spacing: -2px;
    }

    h2 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1rem, 3vw, 1.6rem);
      margin-top: 1.5rem;
      color: #ffcc00;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      animation: pulse 2s ease-in-out infinite;
    }

    h2 a {
      color: #ffcc00;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    h2 a:hover {
      color: #fff;
    }

    img {
      margin-top: 2.5rem;
      max-width: min(90vw, 500px);
      border: 3px solid #ff2020;
      box-shadow: 0 0 30px #ff000066;
      border-radius: 4px;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.6; }
      97% { opacity: 1; }
      98% { opacity: 0.4; }
      99% { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <h1>KILL YOURSELF!!!!</h1>
  <h2>READ THE LINK!</h2>
  <img src="./IMG_2795.jpeg" alt="">
</body>
</html>
